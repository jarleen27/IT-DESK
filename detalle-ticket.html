<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Ticket | ITDESK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-itdesk">
        <div class="container">
            <a class="navbar-brand" href="dashboard-tecnico.html">
                <i class="bi bi-headset"></i> ITDESK
            </a>
        </div>
    </nav>

    <div class="container my-5">
        <div class="card shadow">
            <div class="card-header bg-itdesk text-white">
                <h3>Detalle del Ticket</h3>
            </div>
            <div class="card-body">
                <p><strong>ID:</strong> <span id="idTicket"></span></p>
                <p><strong>Cliente:</strong> <span id="cliente"></span></p>
                <p><strong>Equipo:</strong> <span id="equipo"></span></p>
                <p><strong>Departamento:</strong> <span id="departamento"></span></p>
                <p><strong>Descripción:</strong></p>
                <div class="alert alert-light" id="descripcion"></div>
                <hr>
                <div class="mb-3">
                    <label class="form-label">Estado</label>
                    <select class="form-select" id="estado">
                        <option>Pendiente</option>
                        <option>En proceso</option>
                        <option>Resuelto</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>Diagnóstico</label>
                    <textarea id="diagnostico" class="form-control" rows="4"></textarea>
                </div>
                <div class="mb-3">
                    <label>Observaciones</label>
                    <textarea id="observaciones" class="form-control" rows="4"></textarea>
                </div>
                <div class="mb-3">
                    <label>Solución</label>
                    <textarea id="solucion" class="form-control" rows="4"></textarea>
                </div>
                <button class="btn btn-primary" onclick="guardarCambiosTicket()">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
