<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Usuarios | ITDESK</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-itdesk">

        <div class="container">

            <a class="navbar-brand fw-bold" href="dashboard-admin.html">

                <i class="bi bi-headset"></i>

                ITDESK

            </a>

            <div class="ms-auto">

                <a href="dashboard-admin.html" class="btn btn-outline-light">

                    <i class="bi bi-arrow-left"></i>

                    Volver

                </a>

            </div>

        </div>

    </nav>

    <div class="container my-5">

        <h2 class="mb-4">

            Gestión de Usuarios

        </h2>

        <div class="row mb-3">

            <div class="col-md-6">

                <input type="text" id="buscarUsuario" class="form-control" placeholder="Buscar usuario..."
                    onkeyup="buscarUsuarios()">

            </div>

        </div>

        <div class="card shadow">

            <div class="card-header bg-itdesk text-white">

                Usuarios Registrados

            </div>

            <div class="card-body">

                <table class="table table-hover">

                    <thead>

                        <tr>

                            <th>Usuario</th>

                            <th>Rol</th>

                            <th>Estado</th>

                            <th>Acciones</th>

                        </tr>

                    </thead>

                    <tbody id="tablaUsuarios">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- MODAL EDITAR USUARIO -->

    <div class="modal fade" id="modalEditar" tabindex="-1">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header bg-itdesk text-white">

                    <h5 class="modal-title">

                        Editar Usuario

                    </h5>

                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>

                </div>

                <div class="modal-body">

                    <input type="hidden" id="editarIndex">

                    <div class="mb-3">

                        <label>Nombre</label>

                        <input type="text" id="editarNombre" class="form-control">

                    </div>

                    <div class="mb-3">

                        <label>Correo</label>

                        <input type="email" id="editarCorreo" class="form-control">

                    </div>

                    <div class="mb-3">

                        <label>Teléfono</label>

                        <input type="text" id="editarTelefono" class="form-control">

                    </div>

                    <div class="mb-3">

                        <label>Departamento</label>

                        <input type="text" id="editarDepartamento" class="form-control">

                    </div>

                    <div class="mb-3">

                        <label>Rol</label>

                        <select id="editarRol" class="form-select">

                            <option value="cliente">Cliente</option>

                            <option value="tecnico">Técnico</option>

                            <option value="admin">Administrador</option>

                        </select>

                    </div>

                </div>

                <div class="modal-footer">

                    <button class="btn btn-secondary" data-bs-dismiss="modal">

                        Cancelar

                    </button>

                    <button class="btn btn-primary" onclick="guardarEdicionUsuario()">

                        Guardar

                    </button>

                </div>

            </div>

        </div>

    </div>
    <script src="js/script.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
