<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registro | ITDESK</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-light">

    <div class="container py-5">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="card shadow-lg border-0">

                    <div class="card-header bg-itdesk text-white text-center">

                        <h2>

                            <i class="bi bi-person-plus-fill"></i>

                            Registro de Usuario

                        </h2>

                        <p class="mb-0">

                            Cree una cuenta para acceder al sistema ITDESK

                        </p>

                    </div>

                    <div class="card-body p-4">

                        <form id="formRegistro" onsubmit="registrarUsuario(event)">

                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <label>Nombre</label>

                                    <input type="text" id="nombre" class="form-control" required>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label>Apellido</label>

                                    <input type="text" id="apellido" class="form-control" required>

                                </div>

                            </div>

                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <label>Correo Electrónico</label>

                                    <input type="email" id="correo" class="form-control" required>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label>Teléfono</label>

                                    <input type="text" id="telefono" class="form-control">

                                </div>

                            </div>

                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <label>Departamento</label>

                                    <select id="departamento" class="form-select">

                                        <option>Tecnología</option>

                                        <option>Ventas</option>

                                        <option>Contabilidad</option>

                                        <option>Recursos Humanos</option>

                                        <option>Administración</option>

                                    </select>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label>Usuario</label>

                                    <input type="text" id="usuario" class="form-control" required>

                                </div>

                            </div>

                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <label>Contraseña</label>

                                    <input type="password" id="password" class="form-control" required>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label>Confirmar Contraseña</label>

                                    <input type="password" id="confirmar" class="form-control" required>

                                </div>

                            </div>

                            <div class="d-grid gap-2 mt-3">

                                <button type="submit" class="btn btn-primary btn-lg">

                                    <i class="bi bi-person-check-fill"></i>

                                    Registrarme

                                </button>

                                <a href="login.html" class="btn btn-secondary">

                                    Ya tengo una cuenta

                                </a>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="js/script.js"></script>

</body>

</html>
