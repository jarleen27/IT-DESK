<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes | ITDESK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-itdesk">
        <div class="container">
            <a class="navbar-brand fw-bold" href="dashboard-admin.html">
                <i class="bi bi-bar-chart-fill"></i> ITDESK Reportes
            </a>
        </div>
        <div class="nav-item">
            <a class="nav-link active" href="index.html"><i class="bi bi-house-fill"></i> Inicio</a>
        </div>
    </nav>

    <section class="container py-5">
        <h2 class="mb-4">Reportes del Sistema</h2>
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body text-center">
                        <i class="bi bi-ticket-perforated display-3 text-primary"></i>
                        <h3 class="mt-3">999</h3>
                        <p>Tickets Registrados</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body text-center">
                        <i class="bi bi-tools display-3 text-warning"></i>
                        <h3 class="mt-3">999</h3>
                        <p>Tickets En Proceso</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body text-center">
                        <i class="bi bi-check-circle display-3 text-success"></i>
                        <h3 class="mt-3">999</h3>
                        <p>Tickets Resueltos</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow mt-5">
            <div class="card-header bg-itdesk text-white">
                <h4>Resumen General</h4>
            </div>
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Reporte</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Clientes Registrados</td>
                            <td>999</td>
                        </tr>
                        <tr>
                            <td>Técnicos Activos</td>
                            <td>999</td>
                        </tr>
                        <tr>
                            <td>Tickets Cerrados</td>
                            <td>999</td>
                        </tr>
                        <tr>
                            <td>Porcentaje de Resolución</td>
                            <td>%</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="text-center mt-5">
            <a href="dashboard-admin.html" class="btn btn-primary">
                <i class="bi bi-arrow-left-circle"></i> Volver al Panel
            </a>
        </div>
    </section>

    <footer class="bg-dark text-white text-center p-4">
        © 2026 ITDESK | Reportes
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
