<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador | ITDESK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-itdesk">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-headset"></i> ITDESK
            </a>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#">Usuarios</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Técnicos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="reportes.html">Reportes</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="usuarios.html">
                        <i class="bi bi-people-fill"></i>
                        Usuarios
                    </a>
                </li>
                
                <li class="nav-item">
                    <a class="nav-link text-warning" href="#" onclick="cerrarSesion()">Cerrar Sesión</a>
                </li>
            </ul>
        </div>
    </nav>

    <section class="container py-5">
        <h2>Bienvenido <strong id="nombreAdmin"></strong></h2>
        <p>Panel de Administración del Sistema</p>

        <div class="row mt-4">
            <div class="col-md-3">
                <div class="card text-center shadow">
                    <div class="card-body">
                        <i class="bi bi-people-fill display-4"></i>
                        <h2 id="totalUsuarios">0</h2>
                        <p>Usuarios</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center shadow">
                    <div class="card-body">
                        <i class="bi bi-person-workspace display-4"></i>
                        <h2 id="totalTecnicos">0</h2>
                        <p>Técnicos</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center shadow">
                    <div class="card-body">
                        <i class="bi bi-ticket-perforated display-4"></i>
                        <h2 id="totalTickets">0</h2>
                        <p>Tickets</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center shadow">
                    <div class="card-body">
                        <i class="bi bi-check-circle display-4"></i>
                        <h2 id="ticketsResueltos">0</h2>
                        <p>Resueltos</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="container mb-5">
        <div class="card shadow">
            <div class="card-header bg-itdesk text-white">Usuarios Registrados</div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Usuario</th>
                            <th>Departamento</th>
                            <th>Rol</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaUsuarios"></tbody>
                </table>
            </div>
        </div>
    </section>

    <script src="js/script.js"></script>
</body>

</html>
