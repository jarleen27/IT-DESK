<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Ticket | ITDESK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-itdesk">
        <div class="container">
            <a class="navbar-brand fw-bold" href="dashboard-cliente.html">
                <i class="bi bi-headset"></i> ITDESK
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html"><i class="bi bi-house-fill"></i> Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Registrar Ticket</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Mis Tickets</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-warning" href="#" onclick="cerrarSesion()">Cerrar Sesión</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ENCABEZADO -->
    <section class="bg-light py-5">
        <div class="container">
            <h2>Registrar Nueva Solicitud de Soporte</h2>
            <p>Complete el siguiente formulario para reportar la incidencia de su equipo.</p>
        </div>
    </section>

    <!-- FORMULARIO -->
    <section class="container my-5">
        <div class="card shadow">
            <div class="card-header bg-itdesk text-white">
                <h4>Formulario de Registro</h4>
            </div>
            <div class="card-body">
                <form id="formTicket" onsubmit="registrarTicket(event)">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nombre del Cliente</label>
                            <input type="text" class="form-control" id="cliente" readonly>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Correo Electrónico</label>
                            <input type="email" class="form-control">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="text" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Departamento</label>
                            <select class="form-select" id="departamento" onchange="mostrarOtroDepartamento()">
                                <option value="">Seleccione un departamento</option>
                                <option>Ventas</option>
                                <option>Recursos Humanos</option>
                                <option>Contabilidad</option>
                                <option>Tecnología</option>
                                <option>Administración</option>
                                <option value="Otro">Otro</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3" id="otroDepartamentoDiv" style="display:none;">
                            <label class="form-label">Especifique el departamento</label>
                            <input type="text" class="form-control" id="otroDepartamento"
                                placeholder="Ejemplo: Logística">
                        </div>
                    </div>
                    <hr>
                    <h5>Información del Equipo</h5>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label>Tipo de Equipo</label>
                            <select class="form-select" id="tipoEquipo" onchange="mostrarOtroEquipo()">
                                <option value="">Seleccione un equipo</option>
                                <option>Laptop</option>
                                <option>Computadora de Escritorio</option>
                                <option>Impresora</option>
                                <option>Servidor</option>
                                <option>Router</option>
                                <option>Switch</option>
                                <option value="Otro">Otro</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3" id="otroEquipoDiv" style="display:none;">
                            <label>Especifique el equipo</label>
                            <input type="text" class="form-control" id="otroEquipo" placeholder="Ejemplo: Escáner">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label>Marca</label>
                            <input type="text" class="form-control">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label>Modelo</label>
                            <input type="text" class="form-control">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Número de Serie</label>
                            <input type="text" class="form-control">
                        </div>
                    </div>
                    <hr>
                    <h5>Descripción del Problema</h5>
                    <div class="mb-3">
                        <textarea class="form-control" id="descripcion" rows="6"></textarea>
                    </div>
                    <div class="mb-3">
                        <label>Adjuntar Evidencia (Opcional)</label>
                        <input type="file" class="form-control">
                    </div>
                    <div class="text-end">
                        <button type="reset" class="btn btn-secondary">Limpiar</button>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-send-fill"></i> Registrar Ticket
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center p-4">
        © 2026 ITDESK | Registro de Tickets
    </footer>

    <script src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
